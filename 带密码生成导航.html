<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的导航 - 编辑版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--accent:#3b82f6;--hover:#2563eb;--shadow:0 8px 30px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;--accent:#3b82f6;--hover:#60a5fa;--shadow:0 8px 30px rgba(0,0,0,.2)}}
body{background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
header{text-align:center;margin:40px 0}header h1{font-size:30px;font-weight:700;margin-bottom:8px}header p{color:var(--muted)}
.bar{display:flex;gap:12px;margin-bottom:24px}
.btn{padding:10px 16px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer}
.btn.gray{background:var(--card);color:var(--text);border:1px solid var(--border)}
.editor{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:30px}
.editor input{width:100%;margin-bottom:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg)}
.sect{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sect:last-child{border-bottom:0}
.link-item{display:flex;gap:8px;margin-top:8px;align-items:center}
.link-item input{flex:1;margin:0}
.preview{margin-top:40px;padding-top:30px;border-top:1px solid var(--border)}
/* 仅新增：密码按钮样式 */
.btn-pwd{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12px;margin-left:8px;line-height:1}
/* 仅新增：密码弹窗样式 */
#pwdModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
#pwdModal .box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:25px;width:100%;max-width:350px}
#pwdModal .box p{margin:0 0 15px 0;font-size:16px}
#pwdModal .box input{width:100%;height:45px;padding:0 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;margin-bottom:20px;outline:none}
#pwdModal .box .btn-group{display:flex;gap:10px}
</style>
</head>
<body>
<header>
<h1>我的导航</h1>
<p>编辑 → 保存 → 生成新网页</p>
</header>

<div class="bar">
<button class="btn" onclick="saveHtml()">💾 保存生成 index.html</button>
<button class="btn gray" onclick="addSect()">➕ 添加分类</button>
</div>

<div class="editor" id="editor"></div>

<div class="preview">
<small>预览</small>
</div>

<!-- 仅新增：密码设置弹窗 -->
<div id="pwdModal">
  <div class="box">
    <p>设置访问密码（留空取消）</p>
    <input type="password" id="pwdInput" placeholder="请输入密码">
    <div class="btn-group">
      <button class="btn gray" onclick="hidePwdModal()">取消</button>
      <button class="btn" onclick="savePwd()">确认</button>
    </div>
  </div>
</div>

<script>
// 1. 原数据仅新增pwd字段，结构完全不变
let data = [
  {name:"常用工具", pwd:"", links:[{name:"工作后台",url:"#",pwd:""},{name:"云盘",url:"#",pwd:""},{name:"图片处理",url:"#",pwd:""}]},
  {name:"学习资料", pwd:"", links:[{name:"学习平台",url:"#",pwd:""},{name:"电子书",url:"#",pwd:""},{name:"文献查询",url:"#",pwd:""}]},
  {name:"生活娱乐", pwd:"", links:[{name:"影视",url:"#",pwd:""},{name:"音乐",url:"#",pwd:""},{name:"购物",url:"#",pwd:""}]}
];
// 临时存储加密目标：分类/链接索引
let pwdObj = {type: '', i: 0, j: 0};

// 2. 原render函数仅新增密码按钮，逻辑完全不变
function render(){
  let e=document.getElementById('editor');e.innerHTML='';
  data.forEach((s,i)=>{
    let d=document.createElement('div');d.className='sect';
    // 分类行+密码按钮
    d.innerHTML+=`<div style="display:flex;align-items:center;margin-bottom:10px">
      <input placeholder="分类名称" value="${s.name}" oninput="data[${i}].name=this.value" style="margin-bottom:0">
      <button class="btn-pwd" onclick="showPwdModal('sect',${i})">🔒 分类密码</button>
    </div>`;
    // 链接行+密码按钮（修改按钮文字，区分分类/链接）
    s.links.forEach((l,j)=>{
      d.innerHTML+=`<div class="link-item">
        <input placeholder="网站名" value="${l.name}" oninput="data[${i}].links[${j}].name=this.value">
        <input placeholder="网址" value="${l.url}" oninput="data[${i}].links[${j}].url=this.value">
        <button class="btn-pwd" onclick="showPwdModal('link',${i},${j})">🔒 链接密码</button>
        <button class="btn gray" onclick="delLink(${i},${j})">−</button>
      </div>`;
    });
    d.innerHTML+=`<button class="btn gray" onclick="addLink(${i})">+ 链接</button> <button class="btn gray" onclick="delSect(${i})">删除分类</button>`;
    e.appendChild(d);
  })
}

// 3. 仅新增：密码弹窗基础操作（无其他逻辑）
function showPwdModal(type, i, j){
  pwdObj = {type, i, j};
  // 回显已设置的密码
  document.getElementById('pwdInput').value = type==='sect' ? data[i].pwd : data[i].links[j].pwd;
  document.getElementById('pwdModal').style.display = 'flex';
}
function hidePwdModal(){
  document.getElementById('pwdModal').style.display = 'none';
  document.getElementById('pwdInput').value = '';
}
function savePwd(){
  let pwd = document.getElementById('pwdInput').value.trim();
  if(pwdObj.type==='sect'){
    data[pwdObj.i].pwd = pwd;
  }else{
    data[pwdObj.i].links[pwdObj.j].pwd = pwd;
  }
  hidePwdModal();
  render();
}

// 4. 原编辑函数：完全未修改，一字未动
function addSect(){data.push({name:"新分类",pwd:"",links:[]});render()}
function delSect(i){data.splice(i,1);render()}
function addLink(i){data[i].links.push({name:"名称",url:"https://",pwd:""});render()}
function delLink(i,j){data[i].links.splice(j,1);render()}

// 5. 原saveHtml函数：错误提示改为「密码错误，请联系陈美龙」
function saveHtml(){
  // 拼接搜索框+2个密码弹窗（分类验证+链接验证）+ 核心脚本
  let t = '<div class="search"><input type="text" placeholder="搜索站点…" id="search"></div>';
  // 分类加密验证弹窗+链接加密验证弹窗+核心逻辑
  t += `
  <!-- 分类密码验证弹窗 -->
  <div id="sectPwdModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:none;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:25px;width:100%;max-width:350px">
      <p style="margin:0 0 15px 0;font-size:16px" id="sectPwdTitle">请输入分类访问密码</p>
      <input type="password" id="sectPwdInput" style="width:100%;height:45px;padding:0 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;margin-bottom:20px;outline:none" placeholder="密码验证后查看分类">
      <div style="display:flex;gap:10px">
        <button class="btn gray" onclick="document.getElementById('sectPwdModal').style.display='none'">取消</button>
        <button class="btn" onclick="checkSectPwd()">确认</button>
      </div>
    </div>
  </div>
  <!-- 链接密码验证弹窗 -->
  <div id="linkPwdModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:none;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:25px;width:100%;max-width:350px">
      <p style="margin:0 0 15px 0;font-size:16px">请输入链接访问密码</p>
      <input type="password" id="linkPwdInput" style="width:100%;height:45px;padding:0 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;margin-bottom:20px;outline:none" placeholder="密码验证后访问链接">
      <div style="display:flex;gap:10px">
        <button class="btn gray" onclick="document.getElementById('linkPwdModal').style.display='none'">取消</button>
        <button class="btn" onclick="checkLinkPwd()">确认</button>
      </div>
    </div>
  </div>
  <script>
    // 分类加密全局变量：存储分类索引/密码/名称
    let targetSectIndex = -1, targetSectPwd = '', targetSectName = '';
    // 链接加密全局变量：存储目标链接/密码
    let targetLinkUrl = '', targetLinkPwd = '';
    // 打开分类密码弹窗
    function openSectPwdBox(index, pwd, name){
      targetSectIndex = index;targetSectPwd = pwd;targetSectName = name;
      document.getElementById('sectPwdTitle').innerText = '【'+name+'】请输入分类密码';
      document.getElementById('sectPwdModal').style.display='flex';
      document.getElementById('sectPwdInput').value='';
    }
    // 验证分类密码（错误提示：密码错误，请联系陈美龙）
    function checkSectPwd(){
      if(document.getElementById('sectPwdInput').value.trim()===targetSectPwd){
        document.getElementById('sectPwdModal').style.display='none';
        document.getElementById('grid_'+targetSectIndex).style.display='grid';
        document.getElementById('sectTitle_'+targetSectIndex).style.pointerEvents='none';
      }else{alert('密码错误，请联系陈美龙！');}
    }
    // 打开链接密码弹窗
    function openLinkPwdBox(url, pwd){
      targetLinkUrl = url;targetLinkPwd = pwd;
      document.getElementById('linkPwdModal').style.display='flex';
      document.getElementById('linkPwdInput').value='';
    }
    // 验证链接密码（错误提示：密码错误，请联系陈美龙）
    function checkLinkPwd(){
      if(document.getElementById('linkPwdInput').value.trim()===targetLinkPwd){
        window.open(targetLinkUrl,'_blank');
        document.getElementById('linkPwdModal').style.display='none';
      }else{alert('密码错误，请联系陈美龙！');}
    }
  <\/script>
  `;

  // 遍历分类：分类加密则默认隐藏链接，点击分类名验证密码后显示；链接加密则点击验证
  data.forEach((s,sectIndex)=>{
    t += `<div class="section">
      <h2 id="sectTitle_${sectIndex}" style="cursor:pointer" onclick="openSectPwdBox(${sectIndex},'${s.pwd}','${s.name}')">${s.name} ${s.pwd?'🔒':''}</h2>
      <div id="grid_${sectIndex}" class="grid" style="display:${s.pwd?'none':'grid'}">`;
    // 遍历分类下链接
    s.links.forEach(n=>{
      let linkPwd = n.pwd;
      if(linkPwd && n.url!=='#'){
        // 单链接加密：点击链接弹密码框
        t += `<div onclick="openLinkPwdBox('${n.url}','${linkPwd}')" class="item" style="cursor:pointer">
          <div class="ico">${n.name.charAt(0)}</div>
          <div class="name">${n.name} 🔒</div>
        </div>`;
      }else{
        // 普通链接：直接跳转
        t += `<a href="${n.url}" class="item" target="_blank">
          <div class="ico">${n.name.charAt(0)}</div>
          <div class="name">${n.name}</div>
        </a>`;
      }
    });
    t += '</div></div>';
  });

  // 最终HTML：完全原样式，模板字符串拼接无乱码
  let html = `
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacFont,Segoe UI,Roboto,sans-serif}
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--accent:#3b82f6;--hover:#2563eb;--shadow:0 8px 30px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;--accent:#3b82f6;--hover:#60a5fa;--shadow:0 8px 30px rgba(0,0,0,.2)}}
body{background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
header{text-align:center;margin:50px 0 32px}header h1{font-size:30px;font-weight:700;margin-bottom:8px}header p{color:var(--muted);font-size:15px}
.search{margin:0 auto 40px;max-width:520px}.search input{width:100%;height:50px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text);padding:0 18px;font-size:16px;outline:none;box-shadow:var(--shadow);transition:.2s}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.section{margin-bottom:36px}.section h2{font-size:17px;font-weight:600;margin-bottom:14px;padding-left:10px;border-left:4px solid var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.item{background:var(--card);border-radius:14px;padding:18px 16px;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:12px;border:1px solid var(--border);transition:.25s}
.item:hover{transform:translateY(-3px);border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:var(--shadow)}
.item .ico{width:36px;height:36px;border-radius:10px;background:rgba(59,130,246,.1);display:grid;place-items:center;font-weight:600;color:var(--accent)}
.item:hover .ico{background:rgba(255,255,255,.2);color:#fff}
.item .name{font-size:15px;font-weight:500}
</style>
</head>
<body>
<header><h1>我的导航</h1><p>简洁高效 · 一键直达</p></header>
${t}
<script>
const se=document.getElementById('search');
se.oninput=()=>{
  const v=se.value.toLowerCase();
  document.querySelectorAll('.item').forEach(i=>{
    i.style.display=i.textContent.toLowerCase().includes(v)?'flex':'none'
  })
}
<\/script>
</body>
</html>
  `;

  // 下载文件：指定UTF-8编码，彻底解决乱码
  let blob = new Blob([html], {type: 'text/html; charset=UTF-8'});
  let a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(a.href); // 释放资源
}

// 初始化渲染：原代码，一字未动
render();
</script>
</body>
</html>
