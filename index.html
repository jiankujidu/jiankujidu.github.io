<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>病理技术服务报价系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333}
.header{background:linear-gradient(135deg,#1a73e8,#4285f4);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:20px;font-weight:600}
.header-sub{font-size:12px;opacity:.85;margin-top:2px}
.search-wrap{max-width:600px;margin:12px auto 0;position:relative}
.search-wrap input{width:100%;padding:10px 36px 10px 14px;border:none;border-radius:20px;font-size:14px;outline:none;background:rgba(255,255,255,.95);color:#333;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.search-wrap .search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;color:#999}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid #eee;overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:56px;z-index:99}
.filter-chip{padding:6px 14px;border-radius:16px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;white-space:nowrap;transition:all .2s;user-select:none}
.filter-chip:hover{border-color:#1a73e8;color:#1a73e8}
.filter-chip.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
.action-bar{display:flex;gap:8px;padding:8px 16px;background:#fff;border-bottom:1px solid #eee;align-items:center;flex-wrap:wrap}
.action-btn{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;transition:all .2s}
.action-btn:hover{background:#f0f0f0}
.cart-badge{background:#e53935;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;margin-left:4px;min-width:18px;text-align:center;display:inline-block}
.main-layout{display:flex;min-height:calc(100vh - 56px)}
.content-area{flex:1;padding:16px;padding-bottom:100px}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.item-card{background:#fff;border-radius:10px;padding:14px;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.item-card:hover{border-color:#1a73e8;box-shadow:0 3px 10px rgba(26,115,232,.15);transform:translateY(-1px)}
.item-card .cat-tag{font-size:11px;color:#1a73e8;background:#e8f0fe;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:6px}
.item-card .name{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.3}
.item-card .price{font-size:16px;font-weight:700;color:#e53935}
.item-card .price .unit{font-size:12px;font-weight:400;color:#999}
.item-card{position:relative}.item-card .warn{position:absolute;top:8px;right:8px;background:#ffebee;color:#e53935;font-size:12px;padding:2px 6px;border-radius:4px}.fav-star{background:none;border:none;font-size:16px;cursor:pointer;color:#ccc;padding:2px 6px;line-height:1}.fav-star:hover{color:#e53935}.fav-star.active{color:#f5c518}
.item-count{font-size:12px;color:#999;margin-top:4px}
.item-count b{color:#1a73e8}
.cart-sidebar{width:380px;background:#fff;border-left:1px solid #eee;height:100vh;position:sticky;top:0;overflow-y:auto;box-shadow:-2px 0 8px rgba(0,0,0,.05);flex-shrink:0}
.cart-sidebar h2{font-size:16px;padding:16px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:1}
.cart-sidebar .cart-body{padding:12px 16px}
.cart-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5;gap:8px}
.cart-item .ci-info{flex:1;min-width:0}
.cart-item .ci-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item .ci-price{font-size:13px;color:#e53935}
.cart-item .ci-qty{display:flex;align-items:center;gap:6px}
.cart-item .ci-qty button{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cart-item .ci-qty button:hover{background:#f0f0f0}
.cart-item .ci-qty span{min-width:24px;text-align:center;font-size:13px}
.cart-item .ci-del{color:#999;cursor:pointer;font-size:18px;padding:4px}
.cart-item .ci-del:hover{color:#e53935}
.cart-total{padding:16px;border-top:2px solid #1a73e8;background:#f8fbff;position:sticky;bottom:0}
.cart-total .total-row{display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-bottom:12px}
.cart-total .total-row .label{color:#555}
.cart-total .total-row .val{color:#e53935}
.cart-actions{display:flex;gap:8px;flex-wrap:wrap}
.cart-actions button{flex:1;min-width:100px;padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:none;font-weight:500;transition:all .2s}
.btn-clear{background:#fff;color:#e53935;border:1px solid #e53935!important}
.btn-clear:hover{background:#ffebee}
.btn-excel{background:#217346;color:#fff}
.btn-excel:hover{background:#1a5c38}
.btn-word{background:#2b5797;color:#fff}
.btn-word:hover{background:#1e3f6f}
.btn-txt{background:#4472C4;color:#fff}
.btn-txt:hover{background:#355b9e}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:12px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.modal h3{padding:16px;border-bottom:1px solid #eee;font-size:16px}
.modal .modal-body{padding:16px;font-size:14px;line-height:1.6}
.modal .modal-footer{padding:12px 16px;border-top:1px solid #eee;display:flex;gap:8px;justify-content:flex-end}
.modal .modal-footer button{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px}
.btn-cancel{background:#f5f5f5;color:#555}
.btn-cancel:hover{background:#e5e5e5}
.btn-confirm{background:#1a73e8;color:#fff}
.btn-confirm:hover{background:#1557b0}
.btn-danger{background:#e53935;color:#fff}
.btn-danger:hover{background:#c62828}
.modal.warn-modal h3{background:#ffebee;color:#c62828;border-color:#ef9a9a}
.modal.warn-modal .note-text{background:#fff8e1;border-left:4px solid #ff9800;padding:10px 12px;margin:10px 0;border-radius:0 8px 8px 0;color:#e65100;font-size:13px}
.modal.warn-modal .note-text strong{color:#c62828}
.fav-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5;gap:8px}
.fav-item .fav-info{flex:1;min-width:0}
.fav-item .fav-name{font-size:13px;font-weight:500}
.fav-item .fav-count{font-size:12px;color:#999}
.fav-item .fav-actions{display:flex;gap:6px}
.fav-item .fav-actions button{padding:4px 8px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:11px}
.fav-item .fav-actions button:hover{background:#f0f0f0}
.fav-item .fav-actions .del-fav{color:#e53935;border-color:#e53935}
.pkg-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;align-items:center}
.pkg-item .pkg-note{color:#e65100;font-size:11px;margin-top:2px}
.pkg-total{margin-top:12px;text-align:right;font-size:16px;font-weight:700;color:#e53935;padding-top:12px;border-top:2px solid #e53935}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.cart-toggle-m{display:none}
@media(max-width:768px){
  .items-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .cart-sidebar{display:none;position:fixed;bottom:0;left:0;right:0;height:60vh;width:100%;border-left:none;border-top:1px solid #ddd;z-index:150;transform:translateY(100%);transition:transform .3s}
  .cart-sidebar.mobile-show{transform:translateY(0);display:block}
  .cart-toggle-m{display:flex;position:fixed;bottom:0;left:0;right:0;background:#1a73e8;color:#fff;padding:12px 20px;justify-content:space-between;align-items:center;z-index:140;font-size:14px;cursor:pointer;border:none}
  .content-area{padding-bottom:80px}
  .filter-bar{padding:8px 12px;top:52px}
}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.context-menu{position:fixed;background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:250;padding:4px 0;min-width:120px}
.context-menu div{padding:8px 16px;font-size:13px;cursor:pointer}
.context-menu div:hover{background:#f5f5f5}
.pkg-btn{background:linear-gradient(135deg,#ff9800,#f57c00)!important;color:#fff!important}
.wb-btn{background:linear-gradient(135deg,#9c27b0,#7b1fa2)!important;color:#fff!important}
</style>
</head>
<body>
<div class="header">
  <h1>🔬 病理技术服务报价系统</h1>
  <div class="header-sub">组织病理 · 染色 · 免疫荧光 · 分子检测 · 切片扫描</div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索项目名称、分类...">
    <span class="search-icon">🔍</span>
  </div>
</div>
<div class="filter-bar" id="filterBar"></div>
<div class="action-bar">
  <button class="action-btn wb-btn" onclick="showWbModal()">🧬 WB报价</button>
  <button class="action-btn" onclick="showFavModal()">⭐ 收藏夹</button>
  <button class="action-btn pkg-btn" onclick="showPkgModal()">📦 预设套餐</button>
  <button class="action-btn" onclick="toggleCart()">🛒 购物车 <span class="cart-badge" id="cartBadge">0</span></button>
</div>
<div class="main-layout">
  <div class="content-area" id="contentArea"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <h2>🛒 购物车</h2>
    <div class="cart-body" id="cartBody"></div>
    <div class="cart-total" id="cartTotal" style="display:none">
      <div class="total-row"><span class="label">合计：</span><span class="val" id="totalVal">¥0</span></div>
      <div class="cart-actions">
        <button class="btn-clear" onclick="clearCart()">清空</button>
        <button class="btn-excel" onclick="exportExcel()">📊 Excel</button>
        <button class="btn-word" onclick="exportWord()">📄 Word</button>
        <button class="btn-txt" onclick="exportTxt()">📝 文字版</button>
        <button class="btn-html" onclick="exportHtmlSystem()" style="background:linear-gradient(135deg,#4caf50,#388e3c);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px">🌐 HTML系统</button>
      </div>
    </div>
  </div>
</div>
<button class="cart-toggle-m" onclick="toggleCart()">🛒 购物车 (<span id="cartBadgeM">0</span>项) | ¥<span id="totalM">0</span></button>
<div class="modal-overlay" id="warnModal"><div class="modal warn-modal"><h3 id="warnTitle"></h3><div class="modal-body"><div id="warnBody"></div></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal('warnModal')">取消</button><button class="btn-confirm" id="warnConfirmBtn">确认加购</button></div></div></div>
<div class="modal-overlay" id="clearModal"><div class="modal"><h3>⚠️ 确认清空购物车</h3><div class="modal-body" id="clearBody"></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal('clearModal')">取消</button><button class="btn-danger" id="clearConfirmBtn">确认清空</button></div></div></div>
<div class="modal-overlay" id="favModal"><div class="modal"><h3>⭐ 收藏夹管理</h3><div class="modal-body" id="favBody"></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal('favModal')">关闭</button><button class="btn-danger" onclick="clearAllFav()">清空全部</button></div></div></div>
<div class="modal-overlay" id="favClearModal"><div class="modal"><h3>⚠️ 确认清空全部收藏</h3><div class="modal-body">将删除所有 <span id="favClearCount">0</span> 个收藏方案，此操作不可恢复。</div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal('favClearModal')">取消</button><button class="btn-danger" onclick="doClearAllFav()">确认清空</button></div></div></div>
<div class="modal-overlay" id="pkgModal"><div class="modal"><h3>📦 预设套餐</h3><div class="modal-body" id="pkgBody"></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal('pkgModal')">关闭</button></div></div></div>
<div class="modal-overlay" id="pkgConfirmModal"><div class="modal warn-modal"><h3 id="pkgConfirmTitle"></h3><div class="modal-body" id="pkgConfirmBody"></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal('pkgConfirmModal')">取消</button><button class="btn-confirm" id="pkgConfirmBtn">确认加购</button></div></div></div>
<div class="modal-overlay" id="wbModal">
  <div class="modal" style="max-width:560px">
    <h3>🧬 WB检测报价计算器</h3>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;gap:12px">
          <div style="flex:1">
            <label style="font-size:13px;color:#666;display:block;margin-bottom:4px">样本数量</label>
            <input type="number" id="wbSampleCount" value="15" min="1" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px">
          </div>
          <div style="flex:1">
            <label style="font-size:13px;color:#666;display:block;margin-bottom:4px">检测指标数量</label>
            <input type="number" id="wbIndicatorCount" value="1" min="1" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px">
          </div>
        </div>
        <div>
          <label style="font-size:13px;color:#666;display:block;margin-bottom:4px">蛋白类型</label>
          <select id="wbProteinType" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px">
            <option value="normal">普通蛋白/磷酸化蛋白（188元/孔/样）</option>
            <option value="special">核蛋白/膜蛋白/线粒体蛋白（248元/孔/样）</option>
          </select>
        </div>
        <div>
          <label style="font-size:13px;color:#666;display:block;margin-bottom:4px">同膜方式</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="wbSameMembrane" checked onchange="toggleWbMembrane()">
            <label for="wbSameMembrane" style="font-size:13px">内参和目的蛋白同膜（140元/张膜，每14个样本/张）</label>
          </div>
        </div>
        <div id="wbMembraneInfo" style="background:#f5f5f5;border-radius:6px;padding:10px;font-size:12px;color:#666">
          预计需要 <b id="wbMembraneCount">2</b> 张膜（<span id="wbWellsPerMembrane">8</span> 样本/张）
        </div>
        <div id="wbResult" style="display:none;margin-top:8px">
          <div style="background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px">
            <div style="font-weight:600;color:#333;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee">报价结果</div>
            <div id="wbResultContent"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('wbModal')">关闭</button>
      <button class="btn-confirm" onclick="calcWbQuote()">计算报价</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="renameModal"><div class="modal"><h3>重命名收藏</h3><div class="modal-body"><input type="text" id="renameInput" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px" /></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal('renameModal')">取消</button><button class="btn-confirm" id="renameConfirmBtn">确认</button></div></div></div>
<div class="toast" id="toast"></div>
<div class="context-menu" id="ctxMenu" style="display:none"></div>

    if(!card)return;

    showCtxMenu(e,id);
  });

function renderFilters(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML='';
  // 全部按钮
  const allBtn=document.createElement('div');
  allBtn.className='filter-chip '+(activeCat==='全部'?'active':'');
  allBtn.textContent='全部 ('+ITEMS.length+')';
  allBtn.onclick=function(){filterCat('全部');};
  bar.appendChild(allBtn);
  // 分类按钮
  CATEGORIES.forEach(c=>{
    const label=getCatLabel(c);
    const count=ITEMS.filter(i=>i.category===c).length;
    const chip=document.createElement('div');
    chip.className='filter-chip '+(activeCat===c?'active':'');
    chip.textContent=label+' ('+count+')';
    chip.onclick=function(){filterCat(c);};
    bar.appendChild(chip);
  });
}

function filterCat(c){activeCat=c;renderFilters();renderItems()}

function addToCart(id){
  const item=getItem(id);
  if(!item)return;
  if(item.note){
    pendingItem=item;
    document.getElementById('warnTitle').textContent='⚠️ 注意事项';
    document.getElementById('warnBody').innerHTML=`<p style="font-weight:500;margin-bottom:8px">${item.name} <span style="color:#e53935">¥${item.unitPrice}/${item.unit}</span></p><div class="note-text"><strong>⚠ 注意：</strong>${item.note.replace(/\n/g,'<br>')}</div>`;
    document.getElementById('warnConfirmBtn').onclick=()=>{cart[item.id]=(cart[item.id]||0)+1;saveCart();renderItems();renderCart();closeModal('warnModal');toast('已加购: '+item.name)};
    showModal('warnModal');
  } else {
    cart[id]=(cart[id]||0)+1;
    saveCart();renderItems();renderCart();
    toast('已加购: '+item.name);
  }
}

function changeQty(id,delta){
  if(!cart[id])return;
  cart[id]+=delta;
  if(cart[id]<=0)delete cart[id];
  saveCart();renderItems();renderCart();
}

function removeFromCart(id){
  delete cart[id];saveCart();renderItems();renderCart();
}

function clearCart(){
  const ids=Object.keys(cart);
  if(!ids.length)return;
  let total=0;
  let count=0;
  ids.forEach(id=>{const item=getItem(+id);if(item){total+=item.unitPrice*(cart[id]||0);count+=cart[id]||0}});
  document.getElementById('clearBody').innerHTML=`购物车共 <b>${count}</b> 项，合计 <b style="color:#e53935">¥${total.toFixed(2)}</b>，确认清空？`;
  document.getElementById('clearConfirmBtn').onclick=()=>{cart={};saveCart();renderItems();renderCart();closeModal('clearModal');toast('购物车已清空')};
  showModal('clearModal');
}

function saveCart(){localStorage.setItem('pq_cart',JSON.stringify(cart))}

function getTotal(){let t=0;Object.entries(cart).forEach(([id,qty])=>{const item=getItem(+id);if(item)t+=item.unitPrice*qty});return t}

function renderCart(){
  const body=document.getElementById('cartBody');
  const totalDiv=document.getElementById('cartTotal');
  const ids=Object.keys(cart).map(Number);
  if(!ids.length){
    body.innerHTML='<div class="empty-state"><div class="icon">🛒</div><div>购物车为空</div></div>';
    totalDiv.style.display='none';
  } else {
    body.innerHTML=ids.map(id=>{
      const item=getItem(id);
      const qty=cart[id];
      return`<div class="cart-item"><div class="ci-info"><div class="ci-name">${item.name}</div><div class="ci-price">¥${item.unitPrice}/${item.unit} × ${qty} = ¥${(item.unitPrice*qty).toFixed(2)}</div></div><div class="ci-qty"><button onclick="event.stopPropagation();changeQty(${id},-1)">−</button><span>${qty}</span><button onclick="event.stopPropagation();changeQty(${id},1)">+</button></div><div class="ci-del" onclick="event.stopPropagation();removeFromCart(${id})">×</div></div>`
    }).join('');
    totalDiv.style.display='block';
    document.getElementById('totalVal').textContent='¥'+getTotal().toFixed(2);
  }
  const total=ids.reduce((s,id)=>s+(cart[id]||0),0);
  document.getElementById('cartBadge').textContent=total;
  document.getElementById('cartBadgeM').textContent=total;
  document.getElementById('totalM').textContent=getTotal().toFixed(2);
}

function toggleCart(){
  const sb=document.getElementById('cartSidebar');
  sb.classList.toggle('mobile-show');
}

function addToFav(id){

  favorites.push({name,items:{[id]:(cart[id]||0)||1},ts:Date.now()});

function delFav(idx){favorites.splice(idx,1);saveFav();renderItems();showFavModal();toast('已删除收藏')}

function downloadDoc(htmlContent,filename){
  const blob=new Blob(['\ufeff'+htmlContent],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename+'_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')+'.doc';
  a.click();URL.revokeObjectURL(url);
  toast('Word已导出');
}

function showModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

init();


// WB Quote Calculator
function showWbModal(){
  document.getElementById('wbSampleCount').value=9;
  document.getElementById('wbIndicatorCount').value=6;
  document.getElementById('wbSameMembrane').checked=true;
  document.getElementById('wbResult').style.display='none';
  toggleWbMembrane();
  showModal('wbModal');
}

function calcWbQuote(){
  const proteinType=document.getElementById('wbProteinType').value;
  const sampleCount=+document.getElementById('wbSampleCount').value||0;
  const indicatorCount=+document.getElementById('wbIndicatorCount').value||0;
  const sameMembrane=document.getElementById('wbSameMembrane').checked;
  
  if(!sampleCount||!indicatorCount){
    toast('请填写样本数量和检测指标数量');
    return;
  }
  
  const PRICE_CONFIG={normal:188,special:248,membrane:140};
  const proteinPrice=PRICE_CONFIG[proteinType];
  const proteinLabel=proteinType==='normal'?'普通蛋白/磷酸化蛋白':'核蛋白/膜蛋白/线粒体蛋白';
  
  // 同膜：每14个样本1张膜
  const membraneCount=sameMembrane?Math.ceil(sampleCount/14):0;
  
  // 方案一
  const plan1Base=proteinPrice*sampleCount*indicatorCount;
  const plan1Membrane=sameMembrane?PRICE_CONFIG.membrane*indicatorCount*membraneCount:0;
  const plan1Total=plan1Base+plan1Membrane;
  
  // 方案二：188元/2孔，固定5组
  const plan2Base=188*indicatorCount*5;
  const plan2Membrane=sameMembrane?PRICE_CONFIG.membrane*indicatorCount*membraneCount:0;
  const plan2Total=plan2Base+plan2Membrane;
  
  const wellsPerMembrane=membraneCount>0?Math.round(sampleCount/membraneCount):0;
  
  let html=`<div>
    <div style="background:#f5f5f5;border-radius:6px;padding:10px;margin-bottom:12px;font-size:12px">
      <div style="font-weight:600;color:#333;margin-bottom:6px">单价表</div>
      <div style="color:#666;line-height:1.6">
        <div>普通蛋白/磷酸化蛋白：188元/孔/样</div>
        <div>核蛋白/膜蛋白/线粒体蛋白：248元/孔/样</div>
        <div>内参和目的蛋白同膜：140元/张膜（每14个样本/张）</div>
      </div>
    </div>
    <div style="margin-bottom:12px;font-size:12px">
      <div style="font-weight:600;color:#333;margin-bottom:6px">当前配置</div>
      <div style="color:#666;line-height:1.6">
        <div>样本数量：${sampleCount} 个</div>
        <div>检测指标：${indicatorCount} 个</div>
        <div>蛋白类型：${proteinLabel}</div>
        <div>同膜方式：${sameMembrane?'内参+目的蛋白同膜，'+membraneCount+'张膜（平均'+wellsPerMembrane+'样本/膜）':'不同膜'}</div>
      </div>
    </div>
    <div style="border:2px solid #1a73e8;border-radius:8px;padding:10px;margin-bottom:10px">
      <div style="font-weight:700;color:#1a73e8;font-size:14px;margin-bottom:8px">【方案一】包结果</div>
      <div style="background:#f8fbff;border-radius:4px;padding:8px;margin-bottom:8px;font-size:12px">
        <div style="color:#333;margin-bottom:4px">单价：${proteinPrice}元/孔/样</div>
        <div style="color:#333;margin-bottom:4px">基础检测费用：${proteinPrice}元 × ${sampleCount}样本 × ${indicatorCount}指标 = ${plan1Base}元</div>
        ${sameMembrane?`<div style="color:#333;margin-bottom:4px">同膜费用：${PRICE_CONFIG.membrane}元 × ${indicatorCount}指标 × ${membraneCount}张膜 = ${plan1Membrane}元</div>`:''}
        <div style="color:#e53935;font-weight:700;margin-top:6px;padding-top:6px;border-top:1px dashed #ddd">合计：${plan1Base}元 + ${plan1Membrane}元 = ${plan1Total}元</div>
      </div>
      <div style="font-size:11px;color:#666;background:#fff3e0;border-radius:4px;padding:6px">
        <b>服务包括：</b>按照符合趋势要求来做，包抗体和内参费用，周期10-15个工作日
      </div>
    </div>
    <div style="border:2px solid #ff9800;border-radius:8px;padding:10px">
      <div style="font-weight:700;color:#ff9800;font-size:14px;margin-bottom:8px">【方案二】只跑条带</div>
      <div style="background:#fff8e1;border-radius:4px;padding:8px;margin-bottom:8px;font-size:12px">
        <div style="color:#333;margin-bottom:4px">单价：188元/2个孔</div>
        <div style="color:#333;margin-bottom:4px">基础检测费用：188元 × ${indicatorCount}指标 × 5组 = ${plan2Base}元</div>
        ${sameMembrane?`<div style="color:#333;margin-bottom:4px">同膜费用：${PRICE_CONFIG.membrane}元 × ${indicatorCount}指标 × ${membraneCount}张膜 = ${plan2Membrane}元</div>`:''}
        <div style="color:#e53935;font-weight:700;margin-top:6px;padding-top:6px;border-top:1px dashed #ddd">合计：${plan2Base}元 + ${plan2Membrane}元 = ${plan2Total}元</div>
      </div>
      <div style="font-size:11px;color:#666;background:#f5f5f5;border-radius:4px;padding:6px">
        <b>服务包括：</b>以跑出条带交付，不调整优化结果，周期10-15工作日
      </div>
    </div>
  </div>`;
  
  document.getElementById('wbResultContent').innerHTML=html;
  document.getElementById('wbResult').style.display='block';
}

function toggleWbMembrane(){
  const sameMembrane=document.getElementById('wbSameMembrane').checked;
  const sampleCount=+document.getElementById('wbSampleCount').value||9;
  const membraneCount=sameMembrane?Math.ceil(sampleCount/14):0;
  const wellsPerMembrane=membraneCount>0?Math.round(sampleCount/membraneCount):0;
  
  document.getElementById('wbMembraneInfo').style.display=sameMembrane?'block':'none';
  document.getElementById('wbMembraneCount').textContent=membraneCount;
  document.getElementById('wbWellsPerMembrane').textContent=wellsPerMembrane;
}

document.getElementById('wbSampleCount').addEventListener('input',toggleWbMembrane);
document.getElementById('wbIndicatorCount').addEventListener('input',toggleWbMembrane);

</script>
